<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>EVE AI</title>
    <style>
        :root { --bg-dark: #0a0a0f; --bg-card: #12121a; --bg-input: #1a1a24; --accent: #00d4aa; --accent-glow: rgba(0,212,170,0.3); --accent-dim: rgba(0,212,170,0.1); --text: #e8e8ed; --text-dim: #8888a0; --text-muted: #55556a; --border: #2a2a3a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); height: 100vh; overflow: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 20%, rgba(0,212,170,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(100,100,255,0.05) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .app { display: flex; height: 100vh; position: relative; z-index: 1; }
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), #00ffcc); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--bg-dark); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .logo-text { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, var(--accent), #00ffcc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .nav-section { flex: 1; padding: 12px; }
        .nav-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px; }
        .nav-btn { display: flex; align-items: center; gap: 10px; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-size: 13px; width: 100%; text-align: left; margin-bottom: 2px; }
        .nav-btn:hover { background: var(--bg-input); color: var(--text); }
        .nav-btn.active { background: var(--accent-dim); color: var(--accent); }
        .nav-btn .icon { font-size: 16px; }
        .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
        .status-card { background: var(--bg-input); border-radius: 10px; padding: 12px; }
        .status-row { display: flex; justify-content: space-between; padding: 6px 0; }
        .status-label { font-size: 11px; color: var(--text-dim); }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; }
        .status-badge.ready { background: rgba(0,212,170,0.15); color: var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; background: rgba(18,18,26,0.8); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 16px; font-weight: 600; }
        .header-right { display: flex; gap: 8px; }
        .header-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); cursor: pointer; font-size: 16px; }
        .header-btn:hover { border-color: var(--accent); color: var(--accent); }
        .header-btn.listening { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); } 50% { box-shadow: 0 0 0 8px transparent; } }
        .chat-container { flex: 1; overflow-y: auto; padding: 24px; }
        .chat-wrapper { max-width: 700px; margin: 0 auto; }
        .message { display: flex; gap: 12px; margin-bottom: 20px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; } }
        .message.user { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: var(--bg-card); }
        .message.assistant .avatar { background: linear-gradient(135deg, var(--accent), #00ffcc); }
        .msg-content { flex: 1; }
        .msg-header { display: flex; gap: 10px; margin-bottom: 8px; }
        .message.user .msg-header { flex-direction: row-reverse; }
        .msg-author { font-weight: 600; font-size: 13px; }
        .msg-time { font-size: 11px; color: var(--text-muted); }
        .msg-body { background: var(--bg-card); border-radius: 16px; padding: 16px 20px; border: 1px solid var(--border); }
        .message.user .msg-body { background: rgba(0,212,170,0.08); border-color: rgba(0,212,170,0.2); }
        .msg-body h1 { font-size: 20px; margin-bottom: 12px; color: var(--accent); }
        .msg-body h2 { font-size: 15px; margin: 16px 0 10px; }
        .msg-body p { margin-bottom: 10px; color: #c0c0c8; line-height: 1.6; }
        .msg-body ul { margin: 10px 0; padding-left: 20px; }
        .msg-body li { margin-bottom: 6px; color: #a0a0a8; }
        .msg-body code { background: var(--bg-input); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; color: var(--accent); }
        .msg-body strong { color: var(--accent); }
        .input-area { padding: 16px 24px; background: rgba(18,18,26,0.9); border-top: 1px solid var(--border); }
        .input-wrapper { max-width: 700px; margin: 0 auto; background: var(--bg-card); border-radius: 16px; padding: 6px; border: 1px solid var(--border); display: flex; gap: 6px; }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .msg-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; padding: 12px; outline: none; resize: none; }
        .msg-input::placeholder { color: var(--text-muted); }
        .input-btn { width: 44px; height: 44px; border-radius: 12px; border: none; background: var(--bg-input); color: var(--text-dim); cursor: pointer; font-size: 16px; }
        .input-btn:hover { color: var(--accent); }
        .input-btn.send { background: var(--accent); color: var(--bg-dark); }
        .thinking { display: flex; gap: 4px; padding: 8px 0; }
        .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite; }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); } }
        .welcome-card { background: linear-gradient(135deg, var(--bg-card), var(--bg-input)); border-radius: 18px; padding: 28px; margin-bottom: 20px; border: 1px solid var(--border); }
        .welcome-title { font-size: 26px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .feature-item { background: var(--bg-dark); border-radius: 10px; padding: 14px; border: 1px solid var(--border); }
        .feature-icon { font-size: 22px; margin-bottom: 6px; }
        .feature-title { font-weight: 600; font-size: 13px; }
        .feature-desc { font-size: 11px; color: var(--text-muted); }
        .settings-panel, .github-panel { display: none; padding: 24px; max-width: 700px; margin: 0 auto; }
        .settings-panel.active, .github-panel.active { display: block; }
        .settings-section { background: var(--bg-card); border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
        .settings-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .settings-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
        .input-group { margin-bottom: 12px; }
        .input-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
        .text-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 13px; }
        .btn-primary { background: var(--accent); color: var(--bg-dark); border: none; padding: 12px 24px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        @media (max-width: 700px) { .sidebar { display: none; } .chat-container, .input-area, .header { padding: 12px; } }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo"><div class="logo-icon">E</div><div><div class="logo-text">EVE</div><div class="logo-subtitle">Universal AI</div></div>
            </div>
            <div class="nav-section">
                <div class="nav-label">Menu</div>
                <button class="nav-btn active" data-view="chat"><span class="icon">💬</span><span>Chat</span></button>
                <button class="nav-btn" data-view="github"><span class="icon">🔗</span><span>GitHub</span></button>
                <button class="nav-btn" data-view="settings"><span class="icon">⚙️</span><span>Settings</span></button>
            </div>
            <div class="sidebar-footer">
                <div class="status-card">
                    <div class="status-row"><span class="status-label">AI</span><span class="status-badge ready" id="apiStatus">Ready</span></div>
                    <div class="status-row"><span class="status-label">Mode</span><span class="status-badge ready">Offline</span></div>
                </div>
            </div>
        </aside>
        <main class="main">
            <header class="header">
                <h1 class="page-title" id="pageTitle">Chat</h1>
                <div class="header-right">
                    <button class="header-btn" onclick="toggleVoice()" id="voiceBtn">🎤</button>
                    <button class="header-btn" onclick="toggleMute()" id="muteBtn">🔊</button>
                </div>
            </header>
            <div class="chat-container" id="chatView">
                <div class="chat-wrapper" id="messages">
                    <div class="welcome-card">
                        <h1 class="welcome-title">Welcome to EVE AI</h1>
                        <p class="welcome-subtitle">Your universal AI assistant - works offline.</p>
                        <div class="feature-grid">
                            <div class="feature-item"><div class="feature-icon">🤖</div><div class="feature-title">Smart AI</div><div class="feature-desc">Advanced model</div></div>
                            <div class="feature-item"><div class="feature-icon">🎤</div><div class="feature-title">Voice</div><div class="feature-desc">Speak to EVE</div></div>
                            <div class="feature-item"><div class="feature-icon">🔗</div><div class="feature-title">GitHub</div><div class="feature-desc">Search repos</div></div>
                            <div class="feature-item"><div class="feature-icon">📱</div><div class="feature-title">Mobile</div><div class="feature-desc">Works on Android</div></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="settings-panel" id="settingsPanel">
                <div class="settings-section">
                    <h2 class="settings-title">Configuration</h2>
                    <p class="settings-desc">Configure EVE AI.</p>
                    <div class="input-group"><label class="input-label">OpenAI API Key (optional)</label><input type="password" class="text-input" id="apiKeyInput" placeholder="sk-..."></div>
                    <button class="btn-primary" onclick="saveApiKey()">Save</button>
                </div>
            </div>
            <div class="github-panel" id="githubPanel">
                <div class="settings-section">
                    <h2 class="settings-title">GitHub Search</h2>
                    <p class="settings-desc">Search repositories.</p>
                    <div class="input-group"><input type="text" class="text-input" id="ghSearchInput" placeholder="Search..."></div>
                    <button class="btn-primary" onclick="searchGh()">Search</button>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="msg-input" id="userInput" placeholder="Message EVE..." rows="1"></textarea>
                    <button class="input-btn" onclick="toggleVoice()">🎤</button>
                    <button class="input-btn send" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        let isListening = false, voiceEnabled = true, isProcessing = false;
        let apiKey = localStorage.getItem('eve_api_key') || '';
        document.querySelectorAll('.nav-btn').forEach(btn => { btn.addEventListener('click', () => { const view = btn.dataset.view; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('chatView').style.display = view === 'chat' ? 'block' : 'none'; document.getElementById('settingsPanel').classList.toggle('active', view === 'settings'); document.getElementById('githubPanel').classList.toggle('active', view === 'github'); document.getElementById('pageTitle').textContent = view.charAt(0).toUpperCase() + view.slice(1); }); });
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) { recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US'; recognition.onresult = e => { const t = Array.from(e.results).map(r => r[0].transcript).join(''); if (e.results[0].isFinal) { document.getElementById('userInput').value = t; sendMessage(); } }; recognition.onend = () => { isListening = false; updateVoiceBtn(); }; }
        function toggleVoice() { if (!recognition) { alert('Voice not supported'); return; } isListening ? recognition.stop() : recognition.start(); isListening = !isListening; updateVoiceBtn(); }
        function updateVoiceBtn() { document.getElementById('voiceBtn').classList.toggle('listening', isListening); }
        function toggleMute() { voiceEnabled = !voiceEnabled; document.getElementById('muteBtn').textContent = voiceEnabled ? '🔊' : '🔇'; }
        function speak(text) { if (!voiceEnabled) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.rate = 0.9; u.pitch = 1.0; u.volume = 0.8; window.speechSynthesis.speak(u); }
        const responses = { greeting: ["Hello! I'm EVE. How can I help?", "Hi there! What can I do for you?", "Welcome! I'm here to assist."], help: ["I can help with coding, writing, research, and more. Just ask!"], code: ["I can help with code! Tell me what language you need.", "Coding assistance available."], search: ["Web search available when connected to server."], default: ["That's interesting. Tell me more.", "Got it. What else?", "I understand. How can I help further?"] };
        function getResponse(input) { const l = input.toLowerCase(); if (/^(hi|hello|hey)/i.test(l)) return responses.greeting[Math.floor(Math.random() * responses.greeting.length)]; if (/help|what can you do/i.test(l)) return responses.help[0]; if (/code|programming|python/i.test(l)) return responses.code[Math.floor(Math.random() * responses.code.length)]; if (/search|find/i.test(l)) return responses.search[0]; if (apiKey && apiKey.startsWith('sk-')) return "API configured! Run Python backend for full AI."; return responses.default[Math.floor(Math.random() * responses.default.length)] + "\n\n---\n\n*Note: Run Python backend for full AI responses.*"; }
        async function sendMessage() { const input = document.getElementById('userInput'); const msg = input.value.trim(); if (!msg || isProcessing) return; addMessage(msg, 'user'); input.value = ''; isProcessing = true; showThinking(); await new Promise(r => setTimeout(r, 800)); hideThinking(); const response = getResponse(msg); addMessage(response, 'assistant'); if (voiceEnabled) speak(response.substring(0, 500)); isProcessing = false; }
        function addMessage(content, role) { const div = document.getElementById('messages'); const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); const esc = content.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>'); const fmt = esc.replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/^\\- (.+)$/gm,'<li>$1</li>').replace(/\\n/g,'<br>'); div.innerHTML += `<div class="message ${role}"><div class="avatar">${role==='assistant'?'E':'👤'}</div><div class="msg-content"><div class="msg-header"><span class="msg-author">${role==='assistant'?'EVE AI':'You'}</span><span class="msg-time">${time}</span></div><div class="msg-body">${fmt}</div></div></div>`; div.parentElement.scrollTop = div.parentElement.scrollHeight; }
        function showThinking() { document.getElementById('messages').innerHTML += `<div class="message assistant" id="thinking"><div class="avatar">E</div><div class="msg-content"><div class="msg-header"><span class="msg-author">EVE AI</span></div><div class="msg-body"><div class="thinking"><span></span><span></span><span></span></div></div></div></div>`; }
        function hideThinking() { const t = document.getElementById('thinking'); if (t) t.remove(); }
        function saveApiKey() { const key = document.getElementById('apiKeyInput').value; if (key.startsWith('sk-')) { localStorage.setItem('eve_api_key', key); apiKey = key; alert('Saved! Run Python backend for full AI.'); } else { alert('Invalid key'); } }
        function searchGh() { addMessage('GitHub search - run backend for full features.', 'assistant'); }
        document.getElementById('userInput').addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    </script>
</body>
</html>
